<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Prix · Te lo regalo Roma</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- HEADER -->
<header class="header">
    <div class="header-inner">
        <div class="header-title">
            <span class="checkered">🏁</span>
            <div>
                <h1>Grand Prix</h1>
                <p class="subtitle">Te lo regalo · Roma e dintorni</p>
            </div>
        </div>
        <div class="date-value" id="current-date" style="font-family:'Orbitron',sans-serif;font-size:clamp(.8rem,2vw,1rem);font-weight:700;"></div>
    </div>
</header>

<!-- HERO STRIP: nostro gruppo -->
<div style="background:linear-gradient(135deg,rgba(230,57,70,.13),rgba(255,215,0,.05));border-bottom:1px solid rgba(230,57,70,.3);padding:16px 24px 14px;">
    <div style="max-width:1100px;margin:0 auto;display:flex;flex-direction:row;align-items:center;gap:16px;flex-wrap:wrap;">

        <!-- icon + name -->
        <div style="display:flex;flex-direction:row;align-items:center;gap:12px;flex-shrink:0;">
            <div style="position:relative;flex-shrink:0;width:52px;height:52px;border-radius:50%;border:2px solid #e63946;box-shadow:0 0 16px rgba(230,57,70,.5);background:url('icons/achivieneaprenderlo.jpg') center/cover no-repeat #1a1a2e;">
                <span style="position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:.95rem;line-height:1;">👑</span>
            </div>
            <div style="display:flex;flex-direction:column;">
                <span style="font-size:.58rem;font-weight:700;letter-spacing:.12em;color:#e63946;margin-bottom:3px;">IL NOSTRO GRUPPO</span>
                <span style="font-size:.8rem;font-weight:700;color:#fff;line-height:1.3;max-width:160px;">A chi viene a prenderlo, lo regalo</span>
            </div>
        </div>

        <!-- pills -->
        <div style="display:flex;flex-direction:row;gap:8px;flex-wrap:wrap;flex:1;min-width:0;">
            <div class="hpill"><div class="hpill-lbl">POSIZIONE</div><div id="hero-rank"   style="font-family:'Orbitron',sans-serif;font-size:.88rem;font-weight:700;color:#fff;">—</div></div>
            <div class="hpill"><div class="hpill-lbl">ISCRITTI</div> <div id="hero-total"  style="font-family:'Orbitron',sans-serif;font-size:.88rem;font-weight:700;color:#fff;">—</div></div>
            <div class="hpill"><div class="hpill-lbl">+IERI</div>    <div id="hero-24h"    style="font-family:'Orbitron',sans-serif;font-size:.88rem;font-weight:700;color:#34d399;">—</div></div>
            <div class="hpill"><div class="hpill-lbl">+7 GIORNI</div><div id="hero-7d"     style="font-family:'Orbitron',sans-serif;font-size:.88rem;font-weight:700;color:#34d399;">—</div></div>
            <div class="hpill">
                <div class="hpill-lbl">TREND RANK
                    <select id="hero-trend-period" style="background:#161625;border:1px solid rgba(255,255,255,.12);color:#7070a0;font-family:'Inter',sans-serif;font-size:.6rem;padding:2px 4px;border-radius:4px;cursor:pointer;outline:none;">
                        <option value="7">7g</option><option value="30">1m</option><option value="90">3m</option><option value="365">1a</option>
                    </select>
                </div>
                <div id="hero-trend-rank" style="font-family:'Orbitron',sans-serif;font-size:.88rem;font-weight:700;color:#fff;">—</div>
            </div>
            <div class="hpill">
                <div class="hpill-lbl">SORPASSI
                    <select id="hero-overtakes-period" style="background:#161625;border:1px solid rgba(255,255,255,.12);color:#7070a0;font-family:'Inter',sans-serif;font-size:.6rem;padding:2px 4px;border-radius:4px;cursor:pointer;outline:none;">
                        <option value="7">7g</option><option value="30">1m</option><option value="90">3m</option><option value="365">1a</option>
                    </select>
                </div>
                <div id="hero-overtakes" style="font-family:'Orbitron',sans-serif;font-size:.88rem;font-weight:700;color:#fff;">—</div>
            </div>
        </div>
    </div>
    <div style="text-align:center;margin-top:12px;">
        <button id="open-stats" style="background:rgba(230,57,70,.15);border:1px solid rgba(230,57,70,.4);color:#e63946;font-family:'Inter',sans-serif;font-size:.78rem;font-weight:600;padding:7px 18px;border-radius:8px;cursor:pointer;letter-spacing:.04em;">📊 Guarda tutte le statistiche</button>
    </div>
</div>

<!-- RACE + CHART -->
<main class="main">
    <section class="race-section">
        <div class="race-container" id="race-container"></div>
    </section>
    <section class="chart-section">
        <h2 class="section-title">📈 Andamento storico</h2>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
            <div id="chart-period-tabs" style="display:flex;gap:6px;flex-wrap:wrap;">
                <button class="chart-tab" data-days="1">24 ore</button>
                <button class="chart-tab" data-days="3">3 giorni</button>
                <button class="chart-tab" data-days="7">1 sett</button>
                <button class="chart-tab" data-days="30">1 mese</button>
                <button class="chart-tab" data-days="365">1 anno</button>
                <button class="chart-tab active" data-days="0">Tutto</button>
            </div>
            <div style="display:flex;gap:6px;">
                <button id="chart-mode-rel" class="chart-tab active" style="background:#e63946;border-color:#e63946;color:#fff;">Crescita</button>
                <button id="chart-mode-abs" class="chart-tab">Totale</button>
                <button id="chart-focus" style="background:#161625;border:1px solid rgba(255,255,255,.1);color:#7070a0;font-family:'Inter',sans-serif;font-size:.72rem;font-weight:600;padding:5px 14px;border-radius:6px;cursor:pointer;">👑 Focalizza</button>
                <button id="chart-all"   style="background:#161625;border:1px solid rgba(255,255,255,.1);color:#7070a0;font-family:'Inter',sans-serif;font-size:.72rem;font-weight:600;padding:5px 14px;border-radius:6px;cursor:pointer;">Mostra tutti</button>
            </div>
        </div>
        <div class="chart-wrapper">
            <canvas id="trend-chart" style="width:100%;height:100%;"></canvas>
        </div>
    </section>
</main>

<!-- CONTROLS -->
<div class="controls-bar">
    <div class="controls-inner">
        <button class="play-btn" id="play-btn" title="Play / Pausa">▶</button>
        <div class="timeline-block">
            <span class="timeline-date" id="date-start">—</span>
            <div class="slider-wrap">
                <input type="range" id="timeline" class="timeline-slider" min="0" value="0" step="1">
            </div>
            <span class="timeline-date" id="date-end">—</span>
        </div>
        <div class="speed-block">
            <label class="speed-label">Vel.</label>
            <select class="speed-select" id="speed">
                <option value="1200">1x</option>
                <option value="700" selected>2x</option>
                <option value="350">4x</option>
                <option value="150">8x</option>
            </select>
        </div>
    </div>
</div>

<!-- STATS MODAL -->
<div id="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;align-items:flex-end;justify-content:center;">
    <div style="background:#0f0f1c;border:1px solid rgba(255,255,255,.08);border-radius:18px 18px 0 0;width:100%;max-width:700px;height:82vh;display:flex;flex-direction:column;overflow:hidden;">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;">
            <h2 style="font-family:'Inter',sans-serif;font-size:1rem;font-weight:700;color:#f0f0ff;">📊 Statistiche complete</h2>
            <button id="close-stats" style="background:rgba(255,255,255,.06);border:none;color:#7070a0;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:.9rem;">✕</button>
        </div>
        <div style="display:flex;align-items:center;gap:10px;padding:10px 20px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;overflow-x:auto;">
            <span style="font-family:'Inter',sans-serif;font-size:.72rem;color:#7070a0;flex-shrink:0;">Periodo:</span>
            <div id="period-tabs" style="display:flex;gap:6px;">
                <button class="period-tab" data-days="1"   style="background:#161625;border:1px solid rgba(255,255,255,.07);color:#7070a0;font-family:'Inter',sans-serif;font-size:.72rem;font-weight:600;padding:5px 13px;border-radius:6px;cursor:pointer;">24 ore</button>
                <button class="period-tab active" data-days="7"   style="background:#e63946;border:1px solid #e63946;color:#fff;font-family:'Inter',sans-serif;font-size:.72rem;font-weight:600;padding:5px 13px;border-radius:6px;cursor:pointer;">7 giorni</button>
                <button class="period-tab" data-days="30"  style="background:#161625;border:1px solid rgba(255,255,255,.07);color:#7070a0;font-family:'Inter',sans-serif;font-size:.72rem;font-weight:600;padding:5px 13px;border-radius:6px;cursor:pointer;">1 mese</button>
                <button class="period-tab" data-days="90"  style="background:#161625;border:1px solid rgba(255,255,255,.07);color:#7070a0;font-family:'Inter',sans-serif;font-size:.72rem;font-weight:600;padding:5px 13px;border-radius:6px;cursor:pointer;">3 mesi</button>
                <button class="period-tab" data-days="365" style="background:#161625;border:1px solid rgba(255,255,255,.07);color:#7070a0;font-family:'Inter',sans-serif;font-size:.72rem;font-weight:600;padding:5px 13px;border-radius:6px;cursor:pointer;">1 anno</button>
            </div>
        </div>
        <div id="modal-body" style="overflow-y:auto;padding:16px 20px 24px;display:flex;flex-direction:column;gap:20px;">
        </div>
    </div>
</div>

<script>window.DATA_FILE="data2.json";</script>
    <script src="app.js"></script>
</body>
</html>
