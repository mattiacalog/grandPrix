name: Grand Prix Scraper

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest
        run: git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install selenium

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Write Facebook cookies
        env:
          FB_COOKIES: ${{ secrets.FB_COOKIES }}
        run: python -c "import os; open('/tmp/fb_cookies.json','w').write(os.environ['FB_COOKIES'])"

      - name: Run scraper
        env:
          FB_PASSWORD: ${{ secrets.FB_PASSWORD }}
          FB_PROFILE_NAME: ${{ secrets.FB_PROFILE_NAME }}
        run: python -u scraper_gha.py

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-shots
          path: debug_shots/
          retention-days: 3

      - name: Commit updated data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/data.json
          git diff --staged --quiet && echo "Nessuna modifica." || (git commit -m "data: snapshot" && git push origin main)
