name: Grand Prix Scraper

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install selenium

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run scraper
        run: python -u scraper_gha.py

      - name: Upload debug screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fb-screenshot
          path: /tmp/fb_homepage.png
          retention-days: 1

      - name: Commit updated data.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: snapshot"
          file_pattern: data/data.json
